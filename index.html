<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para mi persona favorita 🌻</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap');
        body { margin: 0; background: black; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        canvas { filter: drop-shadow(0 0 8px #FFA216); }
        .text-center {
            position: absolute;
            font-family: 'Dancing Script', cursive;
            color: #FFA216;
            font-size: 3rem;
            opacity: 0;
            transition: opacity 2s ease-in;
            text-shadow: 0 0 15px rgba(255, 162, 22, 1);
            z-index: 10;
        }
    </style>
</head>
<body>

    <div class="text-center" id="texto">I love U</div>
    <canvas id="girasol"></canvas>

    <div id="player"></div>

    <script>
        // Carga de la API de YouTube para controlar el tiempo exacto
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        var player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '0',
                width: '0',
                videoId: 'b4iVv91Z6lY',
                playerVars: {
                    'start': 179, // Comienza en 2:59
                    'autoplay': 1,
                    'controls': 0
                },
                events: {
                    'onReady': onPlayerReady
                }
            });
        }

        function onPlayerReady(event) {
            event.target.playVideo();
            // Iniciar dibujo cuando la música empiece
            setTimeout(drawSequence, 500);
        }

        const canvas = document.getElementById('girasol');
        const ctx = canvas.getContext('2d');
        canvas.width = 600;
        canvas.height = 600;
        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;

        function drawSequence() {
            drawPetals();
            setTimeout(drawCenter, 1000);
        }

        function drawPetals() {
            ctx.strokeStyle = "#FFA216";
            ctx.lineWidth = 1;
            for (let i = 0; i < 16; i++) {
                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate((i * Math.PI * 2) / 16);
                for (let j = 0; j < 18; j++) {
                    ctx.beginPath();
                    ctx.arc(100 - j * 4, 50, 30, 0, Math.PI * 2);
                    ctx.stroke();
                }
                ctx.restore();
            }
        }

        const golden_angle = 137.508 * (Math.PI / 180);
        let n = 0;

        function drawCenter() {
            if (n < 140) {
                const r = 4 * Math.sqrt(n);
                const theta = n * golden_angle;
                const x = r * Math.cos(theta) + centerX;
                const y = r * Math.sin(theta) + centerY;

                ctx.beginPath();
                ctx.arc(x, y, 3, 0, Math.PI * 2);
                ctx.fillStyle = "#FFA216";
                ctx.fill();

                n++;
                requestAnimationFrame(drawCenter);
            } else {
                document.getElementById('texto').style.opacity = "1";
            }
        }
    </script>
</body>
</html>
