<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galaxia de Flores 🌻</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap');

        body {
            margin: 0;
            padding: 0;
            background: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            perspective: 800px;
        }

        .header {
            position: absolute;
            top: 10%;
            text-align: center;
            z-index: 100;
            font-family: 'Dancing Script', cursive;
            font-size: 2.5rem;
            color: #fff;
            text-shadow: 0 0 10px #ffeb3b, 0 0 20px #fbc02d;
            width: 100%;
        }

        /* Estrellas estáticas de fondo */
        .star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            opacity: 0.3;
        }

        /* Elementos del Vórtice */
        .vortex-element {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            animation: travel 4s linear infinite;
            pointer-events: none;
        }

        @keyframes travel {
            0% {
                transform: translate3d(0, 0, -800px) rotate(0deg);
                opacity: 0;
            }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% {
                /* El movimiento hacia los lados crea el efecto de expansión */
                transform: translate3d(var(--x), var(--y), 400px) rotate(180deg);
                opacity: 0;
            }
        }

        .flower {
            font-size: 2.5rem;
            filter: drop-shadow(0 0 8px gold);
        }

        .text {
            color: #fff;
            font-family: 'Arial', sans-serif;
            font-weight: bold;
            font-size: 0.9rem;
            text-shadow: 0 0 5px gold;
            white-space: nowrap;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <div class="header">Feliz día de las<br>Flores Amarillas 🌻</div>
    <div id="scene"></div>

    <script>
        const scene = document.getElementById('scene');
        
        // Frases optimizadas para que no saturen
        const phrases = [
            "Mi mejor regalo",
            "Flores para ti",
            "Mi estrella",
            "Lo eres todo",
            "Te amo siempre",
            "Te adoro",
            "Eres luz",
            "Corazón de oro",
            "Mi sueño bonito",
            "Amor de mi vida",
            "Eres única",
            "🌻", "✨", "💛"
        ];

        // Crear 100 estrellas de fondo
        for (let i = 0; i < 100; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.width = star.style.height = Math.random() * 2 + 'px';
            star.style.left = Math.random() * 100 + 'vw';
            star.style.top = Math.random() * 100 + 'vh';
            document.body.appendChild(star);
        }

        function createVortex() {
            const el = document.createElement('div');
            el.className = 'vortex-element';
            
            const isFlower = Math.random() > 0.4;
            if (isFlower) {
                el.innerHTML = `<span class="flower">🌻</span>`;
            } else {
                const txt = phrases[Math.floor(Math.random() * phrases.length)];
                el.innerHTML = `<span class="flower">🌻</span><span class="text">${txt}</span>`;
            }

            // Ángulo aleatorio para que salgan disparadas en todas direcciones
            const angle = Math.random() * Math.PI * 2;
            const distance = 500 + Math.random() * 500;
            const x = Math.cos(angle) * distance + 'px';
            const y = Math.sin(angle) * distance + 'px';

            el.style.setProperty('--x', x);
            el.style.setProperty('--y', y);
            el.style.animationDelay = Math.random() * 2 + 's';

            scene.appendChild(el);

            // Eliminar para que no explote el navegador
            setTimeout(() => el.remove(), 4000);
        }

        // Crear elementos constantemente
        setInterval(createVortex, 250);
    </script>
</body>
</html>
