<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para mi persona favorita 🌻</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@300;700&display=swap');

        *, *::after, *::before { padding: 0; margin: 0; box-sizing: border-box; }

        :root {
            --dark-color: #000;
            --fl-speed: 0.8s;
            --speed-leaf: 2s;
        }

        body {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            min-height: 100vh;
            background-color: var(--dark-color);
            overflow: hidden;
            perspective: 1000px;
            font-family: 'Montserrat', sans-serif;
        }

        /* --- ESTILOS DEL TEMPORIZADOR --- */
        #timer-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            color: white;
            transition: opacity 1s ease;
        }

        #countdown {
            font-size: 6rem;
            font-weight: 700;
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.6);
        }

        /* --- ESTILOS DEL JARDÍN (TU CÓDIGO MEJORADO) --- */
        .night {
            position: fixed;
            left: 50%; top: 0; transform: translateX(-50%);
            width: 100%; height: 100%;
            background-image: radial-gradient(ellipse at top, transparent 0%, var(--dark-color)),
                              radial-gradient(ellipse at bottom, var(--dark-color), rgba(145, 233, 255, 0.2));
            z-index: -1;
        }

        .love-message {
            position: absolute;
            top: 20%;
            width: 100%;
            text-align: center;
            font-family: 'Dancing Script', cursive;
            font-size: 3.5rem;
            color: #ffd700;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.8);
            z-index: 100;
            opacity: 0;
            transition: opacity 3s ease;
        }

        /* Estructura de la Flor Principal */
        .flower { position: absolute; bottom: 10vmin; transform-origin: bottom center; z-index: 10; }
        .flower__line { height: 50vmin; width: 1.5vmin; background-image: linear-gradient(to top, #2d5016, #6b8e23); border-radius: 1vmin; }
        
        .flower__leafs { position: absolute; top: 0; left: 50%; transform: translate(-50%, -100%); }
        
        .flower__leaf {
            position: absolute; bottom: 0; left: 50%; width: 12vmin; height: 4vmin;
            background: linear-gradient(to top, #ff8c00, #ffd700);
            border-radius: 50% 50% 50% 50% / 80% 80% 20% 20%;
            transform-origin: bottom center;
        }

        /* Pétalos en círculo */
        .flower__leaf--1 { transform: translate(-50%, -20%) rotate(0deg); }
        .flower__leaf--2 { transform: translate(-50%, -20%) rotate(45deg); }
        .flower__leaf--3 { transform: translate(-50%, -20%) rotate(90deg); }
        .flower__leaf--4 { transform: translate(-50%, -20%) rotate(135deg); }
        .flower__leaf--5 { transform: translate(-50%, -20%) rotate(180deg); }
        .flower__leaf--6 { transform: translate(-50%, -20%) rotate(225deg); }
        .flower__leaf--7 { transform: translate(-50%, -20%) rotate(270deg); }
        .flower__leaf--8 { transform: translate(-50%, -20%) rotate(315deg); }

        .flower__center {
            position: absolute; top: -2vmin; left: 50%; transform: translateX(-50%);
            width: 6vmin; height: 6vmin; background: #3e2723; border-radius: 50%;
            border: 2px solid #2f1b14; z-index: 20;
        }

        .not-loaded * { animation-play-state: paused !important; }

        /* Animación de las estrellas fugaces */
        .shooting-star {
            position: absolute; width: 2px; height: 2px; background: #fff;
            box-shadow: 0 0 5px #fff; animation: moveStar 3s linear infinite;
        }
        @keyframes moveStar {
            0% { transform: translate(0, 0) rotate(45deg); opacity: 1; }
            100% { transform: translate(100vw, 100vh) rotate(45deg); opacity: 0; }
        }
    </style>
</head>
<body class="not-loaded">

    <div id="timer-screen">
        <h2 style="margin-bottom: 20px; font-family: 'Dancing Script'; font-size: 2rem;">Algo especial para ti...</h2>
        <div id="countdown">3</div>
    </div>

    <div class="night"></div>
    <div class="love-message" id="msg">I love U</div>

    <div class="flowers">
        <div class="flower flower--1">
            <div class="flower__leafs">
                <div class="flower__leaf flower__leaf--1"></div>
                <div class="flower__leaf flower__leaf--2"></div>
                <div class="flower__leaf flower__leaf--3"></div>
                <div class="flower__leaf flower__leaf--4"></div>
                <div class="flower__leaf flower__leaf--5"></div>
                <div class="flower__leaf flower__leaf--6"></div>
                <div class="flower__leaf flower__leaf--7"></div>
                <div class="flower__leaf flower__leaf--8"></div>
                <div class="flower__center"></div>
            </div>
            <div class="flower__line"></div>
        </div>
    </div>

    <div id="player"></div>

    <script>
        // API de YouTube
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        var player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '0', width: '0', videoId: 'b4iVv91Z6lY',
                playerVars: { 'start': 179, 'autoplay': 1, 'controls': 0 },
                events: { 'onReady': onPlayerReady }
            });
        }

        function onPlayerReady(event) {
            // El conteo inicia cuando la música está lista
            startCountdown();
        }

        function startCountdown() {
            let count = 3;
            const timerEl = document.getElementById('countdown');
            const interval = setInterval(() => {
                count--;
                if (count > 0) {
                    timerEl.textContent = count;
                } else if (count === 0) {
                    timerEl.textContent = "¡YA!";
                } else {
                    clearInterval(interval);
                    launchSurprise();
                }
            }, 1000);
        }

        function launchSurprise() {
            document.getElementById('timer-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('timer-screen').style.display = 'none';
                document.body.classList.remove("not-loaded");
                document.getElementById('msg').style.opacity = '1';
                player.playVideo();
            }, 1000);
        }

        // Generador de estrellas fugaces
        setInterval(() => {
            const star = document.createElement('div');
            star.className = 'shooting-star';
            star.style.left = Math.random() * 100 + 'vw';
            star.style.top = Math.random() * 50 + 'vh';
            document.body.appendChild(star);
            setTimeout(() => star.remove(), 3000);
        }, 2000);
    </script>
</body>
</html>
