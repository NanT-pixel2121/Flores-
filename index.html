<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para mi persona favorita 🌻</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@300;600&display=swap');

        body {
            margin: 0;
            padding: 0;
            background: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            perspective: 1200px; /* Profundidad de la galaxia */
        }

        /* Título Principal Estilo Neón */
        .title {
            position: absolute;
            top: 8%;
            width: 90%;
            text-align: center;
            z-index: 100;
            font-family: 'Dancing Script', cursive;
            font-size: 2.5rem;
            color: #fff;
            text-shadow: 0 0 10px #ffeb3b, 0 0 20px #ffeb3b, 0 0 30px #fbc02d;
            animation: pulse 2.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.03); opacity: 0.9; }
        }

        /* Estrellas de fondo */
        .star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            opacity: 0.5;
            animation: twinkle var(--t) linear infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 0.8; }
        }

        /* Contenedor del Vórtice */
        .vortex-item {
            position: absolute;
            opacity: 0;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: moveTowardsMe var(--d) linear infinite;
        }

        @keyframes moveTowardsMe {
            0% {
                transform: translate3d(var(--x), var(--y), -1200px) rotate(0deg) scale(0.1);
                opacity: 0;
            }
            10% { opacity: 1; }
            85% { opacity: 1; }
            100% {
                transform: translate3d(var(--x-end), var(--y-end), 600px) rotate(360deg) scale(1.5);
                opacity: 0;
            }
        }

        .flower {
            font-size: 3.5rem;
            filter: drop-shadow(0 0 15px gold);
            margin-bottom: 10px;
        }

        .phrase {
            font-family: 'Montserrat', sans-serif;
            color: #fff;
            font-weight: 600;
            white-space: nowrap;
            text-shadow: 0 0 10px rgba(255, 235, 59, 0.9);
            font-size: 1rem;
            text-align: center;
            max-width: 250px;
            white-space: normal; /* Permite que frases largas se dividan */
        }
    </style>
</head>
<body>

    <div class="title">Feliz día de las<br>Flores Amarillas 🌻</div>
    <div id="vortex"></div>

    <script>
        const container = document.getElementById('vortex');
        
        // Tus frases corregidas
        const phrases = [
            "Eres el mejor regalo que la vida me ha dado",
            "Flores únicas como tú",
            "Eres la estrella más brillante de mi universo",
            "Lo eres todo y más",
            "Te amo hoy y siempre",
            "Te adoro",
            "Feliz día por ti y por siempre para ti",
            "Tú iluminas mis días",
            "Tienes un corazón que vale más que el oro",
            "La luz de mis ojos eres tú... ya eso está decidido",
            "Eres el amor de mi vida",
            "Tienes valores y emociones que reflejan tu gran calidad humana",
            "Te admiro bastante",
            "Tú eres y siempre serás mi sueño más bonito",
            "🌻", "✨", "💛"
        ];

        // Crear estrellas fijas
        for (let i = 0; i < 120; i++) {
            const s = document.createElement('div');
            s.className = 'star';
            s.style.width = s.style.height = Math.random() * 2.5 + 'px';
            s.style.left = Math.random() * 100 + 'vw';
            s.style.top = Math.random() * 100 + 'vh';
            s.style.setProperty('--t', Math.random() * 3 + 2 + 's');
            document.body.appendChild(s);
        }

        function createItem() {
            const item = document.createElement('div');
            item.className = 'vortex-item';
            
            // Alternar entre flor sola o frase con flor
            if (Math.random() > 0.5) {
                item.innerHTML = `<span class="flower">🌻</span>`;
            } else {
                const p = phrases[Math.floor(Math.random() * phrases.length)];
                item.innerHTML = `<span class="flower">🌻</span><span class="phrase">${p}</span>`;
            }

            // Puntos de origen y fin para el efecto túnel
            const x = (Math.random() - 0.5) * 300 + 'px';
            const y = (Math.random() - 0.5) * 300 + 'px';
            const xEnd = (Math.random() - 0.5) * 3000 + 'px';
            const yEnd = (Math.random() - 0.5) * 3000 + 'px';

            item.style.setProperty('--x', x);
            item.style.setProperty('--y', y);
            item.style.setProperty('--x-end', xEnd);
            item.style.setProperty('--y-end', yEnd);
            item.style.setProperty('--d', Math.random() * 5 + 4 + 's'); // Duración del viaje

            container.appendChild(item);

            // Eliminar elemento después de la animación
            setTimeout(() => item.remove(), 9000);
        }

        // Frecuencia de aparición
        setInterval(createItem, 500);
    </script>
</body>
</html>
