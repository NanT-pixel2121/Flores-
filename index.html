<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galaxia de Flores Amarillas</title>
    <style>
        /* --- ESTILOS GENERALES Y FONDO --- */
        body {
            margin: 0;
            padding: 0;
            background: #000; /* Fondo negro profundo */
            overflow: hidden; /* Evita barras de desplazamiento */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            font-family: 'Verdana', sans-serif;
        }

        /* --- TÍTULO SUPERIOR (COMO EN TU IMAGEN) --- */
        .header {
            position: absolute;
            top: 5%; /* Ajustado para que quepa en pantalla de celular */
            text-align: center;
            z-index: 100; /* Siempre encima */
            width: 100%;
        }

        h1 {
            font-size: 2.2rem;
            color: #fff9c4; /* Amarillo suave */
            text-shadow: 0 0 15px rgba(255, 235, 59, 1), 0 0 5px white; /* Brillo neón */
            margin: 0;
            font-weight: bold;
            line-height: 1.3;
        }

        /* --- NÚCLEO GALÁCTICO CENTRADO --- */
        .core {
            position: absolute;
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 40px 10px rgba(255, 255, 255, 0.8),
                        0 0 80px 30px rgba(255, 235, 59, 0.6);
            top: 55%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
        }

        /* --- ESTRELLAS DE FONDO (TWINKLING) --- */
        #space {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.2; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1); }
        }

        /* --- CONTENEDOR DE LA ÓRBITA --- */
        .galaxy {
            position: absolute;
            top: 55%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 1px;
            height: 1px;
            z-index: 20;
        }

        /* --- ELEMENTOS FLOTANTES (GIRASOLES Y TEXTO) --- */
        .float-element {
            position: absolute;
            top: 50%;
            left: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            transform-origin: center center;
            opacity: 0; /* Empiezan invisibles */
            animation: appear 1s forwards, orbit linear infinite;
        }

        /* Girasoles */
        .sunflower {
            width: 70px;
            height: 70px;
            background-image: url('https://raw.githubusercontent.com/gauravghongde/social-icons/master/PNG/Color/Sunflower.png'); /* URL directa a imagen de girasol */
            background-size: contain;
            background-repeat: no-repeat;
            filter: drop-shadow(0 0 10px gold);
        }

        /* Frases */
        .phrase {
            font-size: 0.9rem;
            color: #fff;
            margin-top: 5px;
            white-space: nowrap;
            text-shadow: 0 0 5px gold;
        }

        /* --- ANIMACIONES --- */
        @keyframes appear {
            to { opacity: 1; }
        }

        /* La animación de órbita mantiene el elemento "vertical" */
        @keyframes orbit {
            /* translateX define el radio de la órbita (distancia al centro) */
            from { transform: rotate(0deg) translateX(var(--radius)) rotate(0deg); }
            to   { transform: rotate(360deg) translateX(var(--radius)) rotate(-360deg); }
        }

    </style>
</head>
<body>

    <div class="header">
        <h1>Feliz día de las<br>Flores Amarillas 🌻</h1>
    </div>

    <div class="core"></div>

    <div id="space"></div>

    <div class="galaxy" id="galaxyContainer"></div>

    <script>
        // Configuración
        const numEstrellas = 150;
        const numFlores = 12; // Cuántas flores en órbita
        const frases = ["Eres pura alegría", "Luz en mi vida", "Detalle especial", "Flores para ti", "Mi favorita"];

        // Elementos DOM
        const space = document.getElementById('space');
        const galaxy = document.getElementById('galaxyContainer');

        // 1. Generar Estrellas de Fondo aleatorias
        for (let i = 0; i < numEstrellas; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 2 + 1 + 'px'; // Tamaños pequeños
            star.style.width = size;
            star.style.height = size;
            star.style.left = Math.random() * 100 + 'vw';
            star.style.top = Math.random() * 100 + 'vh';
            // Tiempos de parpadeo aleatorios
            star.style.animationDelay = Math.random() * 5 + 's';
            space.appendChild(star);
        }

        // 2. Generar Galaxia Orbitante (Flores + Texto)
        for (let i = 0; i < numFlores; i++) {
            const container = document.createElement('div');
            container.className = 'float-element';

            // Girasol
            const flower = document.createElement('div');
            flower.className = 'sunflower';
            
            // Frase (aleatoria del array)
            const text = document.createElement('div');
            text.className = 'phrase';
            text.innerText = frases[Math.floor(Math.random() * frases.length)];

            // Unir elementos
            container.appendChild(flower);
            container.appendChild(text);

            // -- Propiedades de Órbita aleatorias por elemento --
            
            // Radio de órbita (distancia al núcleo)
            const radius = Math.random() * 120 + 80 + 'px'; // Entre 80px y 200px
            container.style.setProperty('--radius', radius);
            
            // Velocidad de órbita (tiempo de vuelta completa)
            const duration = Math.random() * 10 + 10 + 's'; // Entre 10s y 20s
            container.style.animationDuration = duration;
            
            // Retraso de animación para que no salgan todas juntas
            container.style.animationDelay = (Math.random() * -20) + 's'; // Delay negativo para que empiecen en puntos distintos de la órbita
            
            // Dirección aleatoria (unas a favor, otras en contra)
            if (Math.random() > 0.5) {
                container.style.animationDirection = 'reverse';
            }

            // Añadir a la galaxia
            galaxy.appendChild(container);
        }

    </script>
</body>
</html>
